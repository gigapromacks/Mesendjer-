<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация AURAms</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0e1621;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #17212b;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 500;
            color: #fff;
            letter-spacing: 1px;
        }

        .logo p {
            color: #7f8c8d;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #9aa9b2;
            font-size: 14px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background-color: #1f2c38;
            border: 1px solid #2d3b45;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #2b5278;
        }

        input::placeholder {
            color: #5e6f7d;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: #2b5278;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #1f3e5c;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background-color: #1b4a3b;
            color: #8fdec0;
            display: block;
        }

        .message.error {
            background-color: #4a1b2a;
            color: #ff8a9f;
            display: block;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #7f8c8d;
            font-size: 14px;
        }

        .login-link a {
            color: #2b5278;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #3e4a52;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>AURAms</h1>
            <p>Создайте аккаунт</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label>username</label>
                <input type="text" id="username" placeholder="Введите username(до 10символов)" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Введите email" required>
            </div>

            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="Придумайте пароль ( от 6 до 30 сиволов)" required>
            </div>

            <div class="form-group">
                <label>Подтвердите пароль</label>
                <input type="password" id="confirmPassword" placeholder="Повторите пароль" required>
            </div>

            <button type="submit" class="btn">Зарегистрироваться</button>
        </form>

        <div id="message" class="message"></div>

        <div class="login-link">
            Уже есть аккаунт? <a href="/voi">Войти</a>
        </div>

        <div class="footer">
            © 2026 AURAms
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            // Валидация
            if (!username || !email || !password || !confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Заполните все поля';
                return;
            }
            
            if (password !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Пароли не совпадают';
                return;
            }
            
            if(username.length > 15){
                messageDiv.className = 'message error';
                messageDiv.textContent = 'username должен быть до 10 символов';
              
                return;
            }

            if (password.length < 6 ) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Пароль должен быть минимум 6 символов ';
              
                return;
            }
            if(password.length > 30){
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Пароль должен максимум 30 символов ';
              
                return;
            }
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                console.log(data);
                 if(data.message === "такой username уже есть"){
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Такой username уже есть!';
              }
                else if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Регистрация успешна! Перенаправление...';
                    localStorage.setItem('user',username);     ////////////////////////      
                    localStorage.setItem('userId',data.m)
                    // Очищаем форму
                    document.getElementById('registerForm').reset();
                    
                    // Перенаправление через 2 секунды
                    setTimeout(() => {
                        window.location.href = '/mes';
                    }, 1000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.error || 'Ошибка регистрации';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Ошибка сервера';
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
