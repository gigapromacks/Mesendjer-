<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAms</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            padding: 40px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 100px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 500;
            color: #fff;
            letter-spacing: 1px;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            margin-left: 40px;
            font-size: 16px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #fff;
        }

        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            margin-bottom: 140px;
        }

        .hero-content h2 {
            font-size: 52px;
            font-weight: 500;
            line-height: 1.1;
            margin-bottom: 30px;
            color: #fff;
        }

        .hero-content p {
            color: #888;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            background: transparent;
            color: #fff;
            text-decoration: none;
            padding: 15px 40px;
            border: 1px solid #333;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 400;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .hero-image {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            height: 400px;
            border-radius: 30px;
            border: 1px solid #222;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-bottom: 120px;
        }

        .feature h3 {
            color: #fff;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .feature p {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            padding: 60px 0;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
            margin-bottom: 60px;
        }

        .stat-item {
            text-align: left;
        }

        .stat-number {
            color: #fff;
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #444;
            font-size: 14px;
        }

        .footer-links a {
            color: #666;
            text-decoration: none;
            margin-left: 30px;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #fff;
        }

        @media (max-width: 900px) {
            .hero {
                grid-template-columns: 1fr;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
            
            .stats {
                flex-direction: column;
                gap: 30px;
            }
            .logo a {
    text-decoration: none;
}
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">
                <a href="/" style="text-decoration: none;"> <h1>AURAms</h1></a>
            </div>
           
        </nav>

        <div class="hero">
            <div class="hero-content">
                <h2>Мессенджер,<br>который выбирают</h2>
                <p>Приватные сообщения и обмен файлами. Никакой рекламы и слежки.</p>
                <a href="/mes" class="btn">Открыть AURAms</a>
            </div>
            <div class="hero-image">
                <img src="/startHtml/logo.png" alt="AURAms" style="width: 100%; height: 100%; object-fit: cover; border-radius: 30px;">
            </div>
        </div>

       

        <div class="features">
            <div class="feature">
                <h3>Без рекламы</h3>
                <p>Никакой рекламы, трекеров и сбора данных. Только чистый мессенджер.</p>
            </div>
            <div class="feature">
                <h3>Бесплатно</h3>
                <p>Всё бесплатно</p>
            </div>
        </div>

        <div class="footer">
            <div>© 2026 AURAms</div>
        </div>
    </div>
</body>
</html>
